<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇增强版 - 交互原型</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #020617;
  --bg-secondary: rgba(15, 23, 42, 0.72);
  --text-primary: #f8fafc;
  --text-secondary: #cbd5e1;
  --accent-green: #22c55e;
  --accent-orange: #f97316;
  --border-color: rgba(148, 163, 184, 0.22);
  --card-bg: rgba(30, 41, 59, 0.9);
  --snake-head: #22c55e;
  --snake-body: #15803d;
  --food-color: #f97316;
  --food-glow: rgba(249, 115, 22, 0.45);
  --board-bg: #0a0a1a;
  --achievement-unlocked: #22c55e;
  --achievement-locked: #475569;
  --glow-color: rgba(34, 197, 94, 0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: radial-gradient(ellipse at top, rgba(15, 23, 42, 0.9), #020617 60%);
  color: var(--text-primary);
  min-height: 100vh;
  padding: 20px;
}

/* ─── TOP BAR ─── */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 960px;
  margin: 0 auto 24px;
  padding: 0 4px;
}

.logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  letter-spacing: 0.12em;
  color: var(--accent-green);
  background: rgba(34, 197, 94, 0.12);
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid rgba(34, 197, 94, 0.25);
  text-shadow: 0 0 12px var(--glow-color);
}

.settings-btn {
  background: rgba(30, 41, 59, 0.9);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  width: 42px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text-secondary);
}

.settings-btn:hover {
  border-color: var(--accent-green);
  color: var(--accent-green);
  box-shadow: 0 0 16px rgba(34, 197, 94, 0.3);
}

/* ─── GAME CONTAINER ─── */
.game-container {
  max-width: 960px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 24px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 28px;
  padding: 28px;
  backdrop-filter: blur(18px);
  box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
}

@media (max-width: 700px) {
  .game-container {
    grid-template-columns: 1fr;
  }
}

/* ─── BOARD SECTION ─── */
.board-section {
  display: flex;
  flex-direction: column;
  gap: 16px;
  align-items: center;
}

.board-wrapper {
  width: min(400px, 100%);
  aspect-ratio: 1;
  padding: 14px;
  border-radius: 28px;
  background: var(--board-bg);
  border: 1px solid rgba(71, 85, 105, 0.65);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
}

.board {
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-columns: repeat(16, 1fr);
  gap: 4px;
}

.cell {
  border-radius: 6px;
  background: rgba(255,255,255,0.06);
  transition: background 0.1s, transform 0.1s;
}

.cell.snake-head {
  background: linear-gradient(135deg, #bbf7d0, var(--snake-head));
  transform: scale(1.05);
  box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
}

.cell.snake-body {
  background: linear-gradient(135deg, #86efac, var(--snake-body));
}

.cell.food {
  background: radial-gradient(circle at 30% 30%, #fde68a, var(--food-color));
  box-shadow: 0 0 14px var(--food-glow);
  animation: pulse 1.2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

/* ─── DIRECTIONAL PAD ─── */
.dpad {
  display: grid;
  grid-template-columns: repeat(3, 58px);
  grid-template-rows: repeat(3, 58px);
  gap: 6px;
  justify-content: center;
}

.dpad-btn {
  appearance: none;
  border: 1px solid var(--border-color);
  background: var(--card-bg);
  color: var(--text-primary);
  border-radius: 16px;
  font-size: 22px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.dpad-btn:hover {
  background: rgba(34, 197, 94, 0.15);
  border-color: var(--accent-green);
  color: var(--accent-green);
}

.dpad-btn:active {
  transform: scale(0.92);
  background: rgba(34, 197, 94, 0.25);
}

/* ─── INFO SECTION ─── */
.info-section {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.game-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(2rem, 5vw, 3.4rem);
  font-weight: 900;
  line-height: 1;
  color: var(--text-primary);
}

.game-subtitle {
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.7;
  max-width: 380px;
}

/* ─── SCORE CARDS ─── */
.score-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.score-card {
  padding: 16px 18px;
  border-radius: 18px;
}

.score-card.current {
  background: rgba(15, 118, 110, 0.2);
  border: 1px solid rgba(45, 212, 191, 0.2);
}

.score-card.high {
  background: var(--card-bg);
  border: 1px solid var(--border-color);
}

.score-label {
  font-size: 12px;
  letter-spacing: 0.06em;
  color: #99f6e4;
  margin-bottom: 6px;
  text-transform: uppercase;
}

.score-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.new-badge {
  font-size: 10px;
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  background: linear-gradient(135deg, #fde68a, #f97316);
  color: #052e16;
  padding: 2px 8px;
  border-radius: 999px;
  letter-spacing: 0.06em;
  animation: glow-badge 1.5s ease-in-out infinite;
}

@keyframes glow-badge {
  0%, 100% { box-shadow: 0 0 8px rgba(253, 230, 138, 0.6); }
  50% { box-shadow: 0 0 20px rgba(253, 230, 138, 0.9); }
}

/* ─── GAME STATUS ─── */
.game-status {
  padding: 14px 18px;
  border-radius: 16px;
  background: var(--card-bg);
  border: 1px solid var(--border-color);
  font-size: 15px;
  color: var(--text-secondary);
}

.status-label {
  color: var(--text-secondary);
  font-size: 12px;
  margin-bottom: 4px;
}

.status-value {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
}

.restart-btn {
  appearance: none;
  border: none;
  cursor: pointer;
  border-radius: 16px;
  padding: 14px 20px;
  font-size: 15px;
  font-weight: 700;
  color: #052e16;
  background: linear-gradient(135deg, #86efac, var(--accent-green));
  transition: all 0.2s;
  width: 100%;
}

.restart-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(34, 197, 94, 0.4);
}

.restart-btn:active {
  transform: translateY(0);
}

.game-rules {
  font-size: 13px;
  color: #64748b;
  line-height: 1.6;
}

/* ─── ACHIEVEMENTS BAR ─── */
.achievements-section {
  margin-top: 8px;
}

.section-title {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #64748b;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.achievements-grid {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 8px;
}

@media (max-width: 600px) {
  .achievements-grid {
    grid-template-columns: repeat(5, 1fr);
  }
}

.achievement {
  position: relative;
  aspect-ratio: 1;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid transparent;
}

.achievement.unlocked {
  background: rgba(34, 197, 94, 0.15);
  border-color: rgba(34, 197, 94, 0.4);
  color: var(--accent-green);
}

.achievement.unlocked:hover {
  transform: scale(1.1);
  box-shadow: 0 0 16px rgba(34, 197, 94, 0.5);
}

.achievement.locked {
  background: rgba(30, 41, 59, 0.6);
  border-color: rgba(71, 85, 105, 0.4);
  color: #475569;
}

.achievement.locked:hover {
  border-color: #64748b;
}

.achievement-tooltip {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: #0f172a;
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 8px 12px;
  min-width: 140px;
  text-align: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 100;
  white-space: nowrap;
}

.achievement:hover .achievement-tooltip {
  opacity: 1;
}

.tooltip-name {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 2px;
}

.tooltip-desc {
  font-size: 11px;
  color: #94a3b8;
}

/* ─── GAME OVER OVERLAY ─── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(2, 6, 23, 0.88);
  backdrop-filter: blur(12px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.overlay.visible {
  opacity: 1;
  pointer-events: all;
}

.overlay-card {
  background: var(--bg-secondary);
  border: 1px solid rgba(148, 163, 184, 0.3);
  border-radius: 28px;
  padding: 36px;
  max-width: 540px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  text-align: center;
  box-shadow: 0 32px 80px rgba(0, 0, 0, 0.6);
}

.overlay-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 28px;
  font-weight: 900;
  color: #f87171;
  margin-bottom: 20px;
  text-shadow: 0 0 30px rgba(248, 113, 113, 0.5);
}

.overlay-title.victory {
  color: #fbbf24;
  text-shadow: 0 0 30px rgba(251, 191, 36, 0.5);
}

.overlay-scores {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-bottom: 28px;
}

.overlay-score-item {
  text-align: center;
}

.overlay-score-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #64748b;
  margin-bottom: 4px;
}

.overlay-score-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 40px;
  font-weight: 700;
  color: var(--text-primary);
}

.overlay-score-value.high {
  color: #fbbf24;
  text-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
}

/* ─── ACHIEVEMENTS IN OVERLAY ─── */
.overlay-achievements {
  margin-bottom: 28px;
}

.overlay-section-title {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #64748b;
  margin-bottom: 14px;
  text-align: left;
}

.overlay-achievements-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.overlay-achievement {
  position: relative;
  padding: 14px 10px;
  border-radius: 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}

.overlay-achievement.unlocked {
  background: rgba(34, 197, 94, 0.12);
  border: 1px solid rgba(34, 197, 94, 0.35);
}

.overlay-achievement.unlocked:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
}

.overlay-achievement.locked {
  background: rgba(30, 41, 59, 0.5);
  border: 1px solid rgba(71, 85, 105, 0.3);
}

.overlay-achievement-icon {
  font-size: 28px;
  margin-bottom: 6px;
}

.overlay-achievement-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 2px;
}

.overlay-achievement-desc {
  font-size: 10px;
  color: #64748b;
}

.overlay-achievement-tooltip {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: #0f172a;
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 8px 12px;
  min-width: 160px;
  text-align: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 10;
  white-space: nowrap;
}

.overlay-achievement:hover .overlay-achievement-tooltip {
  opacity: 1;
}

/* ─── SKIN SELECTOR ─── */
.overlay-skins {
  margin-bottom: 28px;
}

.skin-selector {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 4px;
  justify-content: center;
  flex-wrap: wrap;
}

.skin-option {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  padding: 10px;
  border-radius: 14px;
  border: 2px solid transparent;
  transition: all 0.2s;
  min-width: 70px;
}

.skin-option:hover {
  background: rgba(255, 255, 255, 0.04);
}

.skin-option.selected {
  border-color: var(--accent-green);
  background: rgba(34, 197, 94, 0.08);
}

.skin-option.locked {
  opacity: 0.4;
  cursor: not-allowed;
}

.skin-preview {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  border: 2px solid rgba(255,255,255,0.1);
}

.skin-preview-head {
  width: 16px;
  height: 16px;
  border-radius: 4px;
  position: absolute;
  z-index: 2;
}

.skin-preview-food {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  position: absolute;
  z-index: 1;
}

.skin-name {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-secondary);
}

.skin-option.selected .skin-name {
  color: var(--accent-green);
}

.skin-lock-icon {
  font-size: 10px;
  color: #475569;
  position: absolute;
  bottom: 2px;
  right: 2px;
}

.skin-option.selected .skin-lock-icon { display: none; }

/* ─── PLAY AGAIN BUTTON ─── */
.play-again-btn {
  appearance: none;
  border: none;
  cursor: pointer;
  border-radius: 18px;
  padding: 16px 32px;
  font-size: 16px;
  font-weight: 700;
  font-family: 'Orbitron', sans-serif;
  color: #052e16;
  background: linear-gradient(135deg, #86efac, var(--accent-green));
  width: 100%;
  transition: all 0.2s;
  letter-spacing: 0.04em;
}

.play-again-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(34, 197, 94, 0.5);
}

.play-again-btn:active {
  transform: translateY(0);
}

/* ─── SETTINGS MODAL ─── */
.settings-modal {
  position: fixed;
  inset: 0;
  background: rgba(2, 6, 23, 0.85);
  backdrop-filter: blur(8px);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.settings-modal.visible {
  opacity: 1;
  pointer-events: all;
}

.settings-content {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 24px;
  padding: 28px;
  max-width: 360px;
  width: 100%;
}

.settings-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
  color: var(--text-primary);
}

.settings-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid rgba(71, 85, 105, 0.2);
}

.settings-row:last-child {
  border-bottom: none;
}

.settings-label {
  font-size: 14px;
  color: var(--text-secondary);
}

.toggle {
  width: 44px;
  height: 24px;
  border-radius: 12px;
  appearance: none;
  background: #1e293b;
  border: 1px solid #334155;
  cursor: pointer;
  position: relative;
  transition: all 0.2s;
}

.toggle:checked {
  background: var(--accent-green);
  border-color: var(--accent-green);
}

.toggle::after {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: white;
  top: 3px;
  left: 3px;
  transition: all 0.2s;
}

.toggle:checked::after {
  left: 23px;
}

.close-settings {
  margin-top: 16px;
  width: 100%;
  padding: 10px;
  border-radius: 12px;
  background: var(--card-bg);
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
}

.close-settings:hover {
  border-color: var(--accent-green);
  color: var(--accent-green);
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <span class="logo">NEXT.JS SNAKE</span>
  <button class="settings-btn" onclick="toggleSettings()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </svg>
  </button>
</div>

<!-- MAIN GAME CONTAINER -->
<div class="game-container">

  <!-- LEFT: Board + D-Pad -->
  <div class="board-section">
    <div class="board-wrapper">
      <div class="board" id="board"></div>
    </div>
    <div class="dpad">
      <span></span>
      <button class="dpad-btn" onclick="sendKey('UP')">↑</button>
      <span></span>
      <button class="dpad-btn" onclick="sendKey('LEFT')">←</button>
      <button class="dpad-btn" onclick="sendKey('DOWN')">↓</button>
      <button class="dpad-btn" onclick="sendKey('RIGHT')">→</button>
    </div>
  </div>

  <!-- RIGHT: Info -->
  <div class="info-section">
    <div>
      <h1 class="game-title">贪吃蛇</h1>
      <p class="game-subtitle">使用方向键或 WASD 控制移动，撞墙或撞到自己时游戏结束。</p>
    </div>

    <div class="score-cards">
      <div class="score-card current">
        <div class="score-label">当前得分</div>
        <div class="score-value" id="score">23</div>
      </div>
      <div class="score-card high">
        <div class="score-label">最高分</div>
        <div class="score-value">
          <span id="high-score">47</span>
          <span class="new-badge" id="new-badge" style="display:none">NEW!</span>
        </div>
      </div>
    </div>

    <div class="game-status">
      <div class="score-label" style="color:#cbd5e1">游戏状态</div>
      <div class="status-value" id="game-status">进行中</div>
    </div>

    <button class="restart-btn" onclick="showOverlay()">重新开始</button>

    <div class="game-rules">
      <p>控制：↑ ↓ ← → / W A S D</p>
      <p>每吃1个食物得1分，无速度递增</p>
    </div>

    <!-- ACHIEVEMENTS BAR -->
    <div class="achievements-section">
      <div class="section-title">🏆 成就</div>
      <div class="achievements-grid" id="achievements-bar"></div>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="settings-modal" id="settings-modal">
  <div class="settings-content">
    <div class="settings-title">⚙ 设置</div>
    <div class="settings-row">
      <span class="settings-label">🎵 音效</span>
      <input type="checkbox" class="toggle" checked id="toggle-sound">
    </div>
    <div class="settings-row">
      <span class="settings-label">📳 震动反馈</span>
      <input type="checkbox" class="toggle" checked id="toggle-vibrate">
    </div>
    <div class="settings-row">
      <span class="settings-label">🌙 深色模式</span>
      <input type="checkbox" class="toggle" checked id="toggle-dark">
    </div>
    <button class="close-settings" onclick="toggleSettings()">关闭</button>
  </div>
</div>

<!-- GAME OVER OVERLAY -->
<div class="overlay" id="game-over-overlay">
  <div class="overlay-card">
    <div class="overlay-title" id="overlay-title">游戏结束</div>

    <div class="overlay-scores">
      <div class="overlay-score-item">
        <div class="overlay-score-label">本局得分</div>
        <div class="overlay-score-value" id="overlay-score">23</div>
      </div>
      <div class="overlay-score-item">
        <div class="overlay-score-label">历史最高</div>
        <div class="overlay-score-value high" id="overlay-high-score">47</div>
      </div>
    </div>

    <!-- Achievements in Overlay -->
    <div class="overlay-achievements">
      <div class="overlay-section-title">🏆 解锁成就</div>
      <div class="overlay-achievements-grid" id="overlay-achievements-grid"></div>
    </div>

    <!-- Skin Selector -->
    <div class="overlay-skins">
      <div class="overlay-section-title">🎨 皮肤选择</div>
      <div class="skin-selector" id="skin-selector"></div>
    </div>

    <button class="play-again-btn" onclick="playAgain()">再来一局</button>
  </div>
</div>

<script>
// ─── DATA MODELS ───────────────────────────────────────
const ACHIEVEMENTS = [
  { id: 'first_bite',    icon: '🍖', name: '初尝禁果',     desc: '第一次吃到食物',              unlocked: true },
  { id: 'gourmet_10',    icon: '🍽',  name: '小有名气',     desc: '单局得 10 分',               unlocked: true },
  { id: 'gourmet_30',    icon: '🌟',  name: '蛇吞百味',     desc: '单局得 30 分',               unlocked: true },
  { id: 'gourmet_50',    icon: '👑',  name: '贪食之王',     desc: '单局得 50 分',               unlocked: false },
  { id: 'half_board',    icon: '🗺',  name: '半壁江山',     desc: '蛇身占棋盘一半',             unlocked: false },
  { id: 'perfect_fill',  icon: '🎯',  name: '完美收官',     desc: '填满整个棋盘',               unlocked: false },
  { id: 'comeback_kid',  icon: '🔥',  name: '绝地反击',     desc: '落后 5 分后翻盘',             unlocked: false },
  { id: 'no_miss',       icon: '🎯',  name: '百发百中',     desc: '连续吃 10 个食物无失误',      unlocked: false },
  { id: 'speedster',     icon: '⚡',  name: '极速反应',     desc: '1 秒内连续吃 2 个食物',       unlocked: false },
];

const SKINS = [
  { id: 'default', name: '经典绿', head: '#22c55e', body: '#15803d', food: '#f97316', bg: '#0a0a1a', unlocked: true },
  { id: 'neon',     name: '霓虹夜',  head: '#06b6d4', body: '#6366f1', food: '#f472b6', bg: '#0a0a1a', unlocked: true },
  { id: 'pixel',    name: '像素复古', head: '#dc2626', body: '#7c2d12', food: '#fbbf24', bg: '#1c1917', unlocked: true },
  { id: 'candy',    name: '糖果风',  head: '#f9a8d4', body: '#db2777', food: '#a3e635', bg: '#2e1065', unlocked: false },
  { id: 'mario',    name: '马里奥',  head: '#ef4444', body: '#1d4ed8', food: '#fbbf24', bg: '#fef3c7', unlocked: false },
];

// ─── STATE ─────────────────────────────────────────────
let currentScore = 23;
let highScore = 47;
let currentSkin = SKINS[0];
let snakeCells = [];
let foodCell = null;
let gameActive = true;

// Demo snake: a small snake in center
function buildDemoSnake() {
  snakeCells = [
    { x: 7, y: 8, isHead: true },
    { x: 6, y: 8 },
    { x: 5, y: 8 },
    { x: 5, y: 9 },
    { x: 5, y: 10 },
    { x: 6, y: 10 },
  ];
  foodCell = { x: 12, y: 8 };
}
buildDemoSnake();

// ─── RENDER BOARD ───────────────────────────────────────
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  for (let y = 0; y < 16; y++) {
    for (let x = 0; x < 16; x++) {
      const cell = document.createElement('div');
      cell.className = 'cell';

      const isHead = snakeCells[0] && snakeCells[0].x === x && snakeCells[0].y === y;
      const isFood = foodCell && foodCell.x === x && foodCell.y === y;
      const isSnakeBody = snakeCells.slice(1).some(s => s.x === x && s.y === y);

      if (isHead) cell.classList.add('snake-head');
      else if (isSnakeBody) cell.classList.add('snake-body');
      if (isFood) cell.classList.add('food');

      board.appendChild(cell);
    }
  }
}

function updateCSSVariables(skin) {
  document.documentElement.style.setProperty('--snake-head', skin.head);
  document.documentElement.style.setProperty('--snake-body', skin.body);
  document.documentElement.style.setProperty('--food-color', skin.food);
  document.documentElement.style.setProperty('--food-glow', skin.food + '73'); // ~45% opacity
  document.documentElement.style.setProperty('--board-bg', skin.bg);
}

// ─── ACHIEVEMENTS RENDER ────────────────────────────────
function renderAchievementsBar() {
  const bar = document.getElementById('achievements-bar');
  bar.innerHTML = '';
  ACHIEVEMENTS.forEach(a => {
    const el = document.createElement('div');
    el.className = `achievement ${a.unlocked ? 'unlocked' : 'locked'}`;
    el.innerHTML = `
      ${a.unlocked ? a.icon : '🔒'}
      <div class="achievement-tooltip">
        <div class="tooltip-name">${a.unlocked ? a.name : '???'}</div>
        <div class="tooltip-desc">${a.unlocked ? a.desc : '未解锁'}</div>
      </div>
    `;
    bar.appendChild(el);
  });
}

function renderOverlayAchievements() {
  const grid = document.getElementById('overlay-achievements-grid');
  grid.innerHTML = '';
  ACHIEVEMENTS.forEach(a => {
    const el = document.createElement('div');
    el.className = `overlay-achievement ${a.unlocked ? 'unlocked' : 'locked'}`;
    el.innerHTML = `
      <div class="overlay-achievement-icon">${a.unlocked ? a.icon : '🔒'}</div>
      <div class="overlay-achievement-name">${a.unlocked ? a.name : '???'}</div>
      <div class="overlay-achievement-desc">${a.unlocked ? a.desc : '未解锁'}</div>
      <div class="overlay-achievement-tooltip">
        <div class="tooltip-name">${a.unlocked ? a.name : '???'}</div>
        <div class="tooltip-desc">${a.unlocked ? a.desc : '未解锁'}</div>
      </div>
    `;
    grid.appendChild(el);
  });
}

// ─── SKIN SELECTOR ──────────────────────────────────────
function renderSkinSelector() {
  const selector = document.getElementById('skin-selector');
  selector.innerHTML = '';
  SKINS.forEach(skin => {
    const el = document.createElement('div');
    el.className = `skin-option ${skin.id === currentSkin.id ? 'selected' : ''} ${!skin.unlocked ? 'locked' : ''}`;
    el.onclick = () => selectSkin(skin);
    el.innerHTML = `
      <div class="skin-preview" style="background:${skin.bg}">
        <div class="skin-preview-head" style="background:linear-gradient(135deg,#fff,${skin.head})"></div>
        <div class="skin-preview-food" style="background:${skin.food}"></div>
        ${!skin.unlocked ? '<div class="skin-lock-icon">🔒</div>' : ''}
      </div>
      <div class="skin-name">${skin.name}</div>
    `;
    selector.appendChild(el);
  });
}

function selectSkin(skin) {
  if (!skin.unlocked) return;
  currentSkin = skin;
  updateCSSVariables(skin);
  renderBoard();
  renderSkinSelector();
}

// ─── CONTROLS ───────────────────────────────────────────
function sendKey(dir) {
  if (!gameActive) return;
  // Visual feedback: move the demo snake briefly
  const dirs = {
    UP:    { x: 0, y: -1 },
    DOWN:  { x: 0, y: 1 },
    LEFT:  { x: -1, y: 0 },
    RIGHT: { x: 1, y: 0 },
  };
  const offset = dirs[dir];
  if (!offset) return;

  const head = snakeCells[0];
  const newHead = { x: head.x + offset.x, y: head.y + offset.y };

  // Simple boundary check for demo
  if (newHead.x < 0 || newHead.x >= 16 || newHead.y < 0 || newHead.y >= 16) {
    // Hit wall - demo ends
    return;
  }

  snakeCells.unshift(newHead);
  snakeCells.pop();
  renderBoard();
}

// ─── OVERLAY ─────────────────────────────────────────────
function showOverlay() {
  document.getElementById('overlay-score').textContent = currentScore;
  document.getElementById('overlay-high-score').textContent = highScore;
  document.getElementById('overlay-title').textContent = '游戏结束';
  renderOverlayAchievements();
  renderSkinSelector();
  document.getElementById('game-over-overlay').classList.add('visible');
}

function hideOverlay() {
  document.getElementById('game-over-overlay').classList.remove('visible');
}

function playAgain() {
  currentScore = 0;
  document.getElementById('score').textContent = '0';
  document.getElementById('game-status').textContent = '进行中';
  document.getElementById('new-badge').style.display = 'none';
  gameActive = true;
  buildDemoSnake();
  renderBoard();
  hideOverlay();
}

// ─── SETTINGS MODAL ──────────────────────────────────────
function toggleSettings() {
  document.getElementById('settings-modal').classList.toggle('visible');
}

// ─── INIT ────────────────────────────────────────────────
function init() {
  updateCSSVariables(currentSkin);
  renderBoard();
  renderAchievementsBar();
}

init();
</script>
</body>
</html>
