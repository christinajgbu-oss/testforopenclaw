<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇增强版 · 分享卡片原型</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 40px 20px;
    }
    .label {
      color: #888;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* === 分享卡片（默认皮肤：经典绿） === */
    .share-card {
      width: 600px;
      height: 400px;
      border-radius: 20px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      overflow: hidden;

      /* 经典绿皮肤 */
      background: #0a1a0a;
      border: 2px solid #00cc44;
      box-shadow: 0 0 40px rgba(0, 204, 68, 0.3), inset 0 0 60px rgba(0, 204, 68, 0.05);
    }

    /* 皮肤切换 */
    .share-card.skin-neon {
      background: #0a0a1a;
      border-color: #00ffff;
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.3), inset 0 0 60px rgba(0, 255, 255, 0.05);
    }
    .share-card.skin-pixel {
      background: #1a0a2e;
      border-color: #cc88ff;
      box-shadow: 0 0 40px rgba(204, 136, 255, 0.3), inset 0 0 60px rgba(204, 136, 255, 0.05);
    }
    .share-card.skin-candy {
      background: #1a0a1a;
      border-color: #ff69b4;
      box-shadow: 0 0 40px rgba(255, 105, 180, 0.3), inset 0 0 60px rgba(255, 105, 180, 0.05);
    }

    /* 顶部：游戏名 + 皮肤标签 */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .game-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
    }
    .skin-badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid currentColor;
      opacity: 0.8;
    }
    .share-card:not(.skin-neon):not(.skin-pixel):not(.skin-candy) .skin-badge { color: #00cc44; }
    .share-card.skin-neon .skin-badge { color: #00ffff; }
    .share-card.skin-pixel .skin-badge { color: #cc88ff; }
    .share-card.skin-candy .skin-badge { color: #ff69b4; }

    /* 得分区 */
    .score-area {
      text-align: center;
      padding: 24px 0;
    }
    .score-label {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }
    .score-value {
      font-size: 72px;
      font-weight: 800;
      line-height: 1;
      color: #fff;
    }
    .score-suffix {
      font-size: 18px;
      color: rgba(255,255,255,0.4);
      margin-left: 4px;
    }

    /* 成就区 */
    .achievements-area {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .achievement-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 13px;
      color: rgba(255,255,255,0.8);
    }
    .achievement-tag .icon { font-size: 14px; }

    /* 游戏时长 */
    .duration-row {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.4);
    }

    /* 按钮区 */
    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: auto;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary {
      background: #fff;
      color: #111;
    }
    .btn-twitter {
      background: #1DA1F2;
      color: #fff;
    }
    .btn-ghost {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* 底部版权 */
    .card-footer {
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
    }

    /* 皮肤切换器 */
    .skin-switcher {
      display: flex;
      gap: 8px;
    }
    .skin-btn {
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      cursor: pointer;
    }
    .skin-btn.active {
      border-color: #00cc44;
      color: #00cc44;
    }
  </style>
</head>
<body>

  <p class="label">P0 · 可分享成绩卡 · 视觉原型</p>

  <!-- 默认皮肤：经典绿 -->
  <div class="share-card" id="card">
    <div class="card-header">
      <span class="game-title">贪吃蛇增强版</span>
      <span class="skin-badge" id="skinName">经典绿</span>
    </div>

    <div class="score-area">
      <div class="score-label">最 终 得 分</div>
      <div class="score-value">42<span class="score-suffix">分</span></div>
    </div>

    <div class="achievements-area">
      <div class="achievement-tag">
        <span class="icon">🏆</span>
        <span>初尝禁果</span>
      </div>
      <div class="achievement-tag">
        <span class="icon">🔥</span>
        <span>小有名气</span>
      </div>
      <div class="achievement-tag">
        <span class="icon">⚡</span>
        <span>极速反应</span>
      </div>
    </div>

    <div class="duration-row">游戏时长 03:24</div>

    <div class="btn-row">
      <button class="btn btn-primary">💾 保存图片</button>
      <button class="btn btn-twitter">🐦 分享到 Twitter</button>
      <button class="btn btn-ghost">关闭</button>
    </div>

    <div class="card-footer">testforopenclaw.pages.dev</div>
  </div>

  <!-- 皮肤切换 -->
  <div class="skin-switcher">
    <button class="skin-btn active" onclick="switchSkin('')">经典绿</button>
    <button class="skin-btn" onclick="switchSkin('skin-neon')">霓虹夜</button>
    <button class="skin-btn" onclick="switchSkin('skin-pixel')">像素复古</button>
    <button class="skin-btn" onclick="switchSkin('skin-candy')">糖果风</button>
  </div>

  <script>
    const skins = {
      '': { name: '经典绿', border: '#00cc44', shadow: 'rgba(0, 204, 68, 0.3)' },
      'skin-neon': { name: '霓虹夜', border: '#00ffff', shadow: 'rgba(0, 255, 255, 0.3)' },
      'skin-pixel': { name: '像素复古', border: '#cc88ff', shadow: 'rgba(204, 136, 255, 0.3)' },
      'skin-candy': { name: '糖果风', border: '#ff69b4', shadow: 'rgba(255, 105, 180, 0.3)' },
    };

    function switchSkin(cls) {
      const card = document.getElementById('card');
      card.className = 'share-card ' + cls;
      document.getElementById('skinName').textContent = skins[cls].name;

      document.querySelectorAll('.skin-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
    }
  </script>

</body>
</html>
