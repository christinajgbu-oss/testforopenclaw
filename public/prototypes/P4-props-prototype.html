<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>道具系统 · 原型</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      gap: 32px;
    }
    h1 { font-size: 20px; color: #00cc44; }
    .label { color: #888; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }

    /* 棋盘 */
    .board {
      display: grid;
      grid-template-columns: repeat(20, 28px);
      grid-template-rows: repeat(20, 28px);
      gap: 1px;
      background: #1a1a1a;
      border: 2px solid #00cc44;
      padding: 2px;
      position: relative;
    }
    .cell {
      background: #0a1a0a;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .cell.snake-head { background: #00cc44; border-radius: 4px; }
    .cell.snake-body { background: #009933; }
    .cell.food { color: #ff6b6b; font-size: 16px; }
    .cell.prop { font-size: 18px; animation: pulse 1s infinite; }
    .cell.obstacle { background: #333; border-radius: 2px; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    /* 道具效果状态栏 */
    .prop-status {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .prop-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .prop-badge.active {
      border-color: #00cc44;
      background: rgba(0,204,68,0.15);
      color: #00cc44;
    }
    .prop-badge .timer {
      font-size: 11px;
      opacity: 0.7;
    }

    /* 道具说明弹窗 */
    .prop-info {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      border: 1px solid #00cc44;
      border-radius: 12px;
      padding: 16px 24px;
      text-align: center;
      font-size: 24px;
      z-index: 10;
      animation: popIn 0.3s ease;
      pointer-events: none;
    }
    .prop-info .sub {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }
    @keyframes popIn {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    /* 道具列表 */
    .prop-table {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 640px;
    }
    .prop-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .prop-card .icon { font-size: 28px; margin-bottom: 6px; }
    .prop-card .name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .prop-card .desc { font-size: 11px; color: rgba(255,255,255,0.5); }

    /* 棋盘尺寸说明 */
    .board-note {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      text-align: center;
    }
  </style>
</head>
<body>

  <p class="label">P4 · 道具系统 · 视觉原型</p>
  <h1>道具系统 · 游戏内示意图</h1>

  <!-- 道具效果状态栏 -->
  <div class="prop-status">
    <div class="prop-badge active">
      <span>⚡</span>
      <span>加速中</span>
      <span class="timer">3s</span>
    </div>
    <div class="prop-badge">
      <span>🛡️</span>
      <span>护盾</span>
    </div>
    <div class="prop-badge">
      <span>🎯</span>
      <span>双倍得分</span>
      <span class="timer">8s</span>
    </div>
  </div>

  <!-- 棋盘 + 道具 -->
  <div class="board">
    <!-- 蛇头位置：第5行第5列 -->
    <div class="cell" style="grid-column:5;grid-row:5"></div>
    <div class="cell snake-head" style="grid-column:6;grid-row:5"></div>
    <div class="cell snake-body" style="grid-column:7;grid-row:5"></div>
    <div class="cell snake-body" style="grid-column:8;grid-row:5"></div>

    <!-- 食物位置：第12行第15列 -->
    <div class="cell food" style="grid-column:15;grid-row:12">🍎</div>

    <!-- 道具位置：第10行第10列 -->
    <div class="cell prop" style="grid-column:10;grid-row:10">⚡</div>

    <!-- 道具说明气泡 -->
    <div class="prop-info">
      ⚡ 加速！
      <div class="sub">速度 +50%，持续 5 秒</div>
    </div>
  </div>

  <p class="board-note">棋盘 20×20 · ⚡ 为随机出现的道具 · 吃到即触发效果</p>

  <!-- 6种道具一览 -->
  <div>
    <p class="label" style="margin-bottom:12px;text-align:center">6 种道具一览</p>
    <div class="prop-table">
      <div class="prop-card">
        <div class="icon">⚡</div>
        <div class="name">加速</div>
        <div class="desc">速度+50%，持续5秒</div>
      </div>
      <div class="prop-card">
        <div class="icon">🐌</div>
        <div class="name">减速</div>
        <div class="desc">速度-50%，持续5秒</div>
      </div>
      <div class="prop-card">
        <div class="icon">🛡️</div>
        <div class="name">护盾</div>
        <div class="desc">下次撞墙/身不死</div>
      </div>
      <div class="prop-card">
        <div class="icon">👻</div>
        <div class="name">幽灵</div>
        <div class="desc">穿墙/穿身，持续5秒</div>
      </div>
      <div class="prop-card">
        <div class="icon">🎯</div>
        <div class="name">双倍得分</div>
        <div class="desc">吃食物×2，持续10秒</div>
      </div>
      <div class="prop-card">
        <div class="icon">✂️</div>
        <div class="name">缩短</div>
        <div class="desc">蛇身缩短3节</div>
      </div>
    </div>
  </div>

</body>
</html>
